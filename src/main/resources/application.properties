# =============================================
# Multi-Vendor E-Commerce - Application Config
# =============================================

# Server
server.port=8081

# ---- MySQL DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/multivendor_ecom?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Akshaya@5
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- SQL Init ----
spring.sql.init.mode=never

# ---- Logging ----
logging.level.com.multivendor=DEBUG
logging.level.org.springframework.web=INFO

# ---- Jackson ----
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=non_null
